<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Expense Tracker with Charts</title>
          <link rel="stylesheet" href="index.css">
          <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

          <div class="container">
                    <h1>Smart Expense Tracker</h1>

                    <div class="stats-container">
                              <div class="card status-balance">
                                        <h3>Current Balance</h3>
                                        <p id="total-balance">$0.00</p>
                              </div>
                              <div class="card status-income">
                                        <h3>Total Income</h3>
                                        <p id="total-income">$0.00</p>
                              </div>
                              <div class="card status-expense">
                                        <h3>Total Expense</h3>
                                        <p id="total-expense">$0.00</p>
                              </div>
                    </div>

                    <div class="main-content">
                              <div class="input-section">
                                        <h2>Add New Transaction</h2>
                                        <form id="transaction-form">
                                                  <div class="form-group">
                                                            <label>Description</label>
                                                            <input type="text" id="text-input"
                                                                      placeholder="e.g., Salary, Groceries" required>
                                                  </div>
                                                  <div class="form-group">
                                                            <label>Amount</label>
                                                            <input type="number" id="amount-input"
                                                                      placeholder="e.g., 500, 50" required>
                                                  </div>
                                                  <div class="form-group">
                                                            <label>Type</label>
                                                            <select id="type-input">
                                                                      <option value="income">Income (+)</option>
                                                                      <option value="expense">Expense (-)</option>
                                                            </select>
                                                  </div>
                                                  <button type="submit" class="btn">Add Transaction</button>
                                        </form>

                                        <h2>History</h2>
                                        <ul id="transaction-list" class="list">
                                        </ul>
                              </div>

                              <div class="chart-section">
                                        <h2>Visual Analytics</h2>
                                        <div class="chart-container-wrapper">
                                                  <canvas id="expense-chart"></canvas>
                                        </div>
                              </div>
                    </div>
          </div>

          <script src="index.js"></script>
</body>

</html>
